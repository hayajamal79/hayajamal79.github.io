<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d1a4a;
            color: #f5f5f5;
        }
        header {
            text-align: center;
            padding: 50px;
            background-color: #a67c23;
        }
        h1 {
            font-size: 3em;
            margin: 0;
        }
        .countdown {
            font-size: 2em;
            margin: 20px auto;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .gallery img {
            margin: 10px;
            border-radius: 8px;
            height: 150px;
        }
        .rsvp {
            text-align: center;
            margin: 20px;
        }
        .rsvp form {
            display: inline-block;
            background: #a67c23;
            padding: 20px;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #0d1a4a;
        }
        /* Add animations for the doors */
        @keyframes open-doors {
            from { transform: rotateY(90deg); }
            to { transform: rotateY(0); }
        }
        .doors { 
            width: 100%; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }
        .door {
            width: 50%;
            height: 100%;
            background: #0d1a4a;
            position: absolute;
            transform-origin: left;
            animation: open-doors 2s forwards;
        }
        .door.right {
            transform-origin: right;
            animation-delay: 2s;
        }
    </style>
</head>
<body>
    <header>
        <div class="doors">
            <div class="door left"></div>
            <div class="door right"></div>
        </div>
        <h1>Marwan & Haya</h1>
        <div class="countdown" id="countdown"></div>
    </header>
    <section class="gallery">
        <img src="photo1.jpg" alt="Gallery Photo 1">
        <img src="photo2.jpg" alt="Gallery Photo 2">
        <img src="photo3.jpg" alt="Gallery Photo 3">
        <img src="photo4.jpg" alt="Gallery Photo 4">
    </section>
    <section class="rsvp">
        <h2>RSVP</h2>
        <form action="submit_rsvp.php" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="submit" value="Submit">
        </form>
    </section>
    <footer>
        <p>Can't wait for you to share our special day with us!</p>
    </footer>
    <script>
        // Countdown Timer
        const weddingDate = new Date('2026-08-15T18:00:00Z');
        const countdownEl = document.getElementById('countdown');

        function updateCountdown() {
            const now = new Date();
            const timeLeft = weddingDate - now;

            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            countdownEl.textContent = `${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`;

            if (timeLeft < 0) {
                clearInterval(countdownInterval);
                countdownEl.textContent = 'The wedding has started!';
            }
        }

        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
